<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" width="1280" height="640">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6BCB8B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#09090B"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#FAFAFA" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Brand: Zerith -->
  <text x="640" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#FAFAFA" text-anchor="middle" letter-spacing="0.5">Zerith</text>

  <!-- Main title -->
  <text x="640" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="600" fill="#FAFAFA" text-anchor="middle" letter-spacing="-1.5">Cryptographic Identity</text>
  <text x="640" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="600" fill="#FAFAFA" text-anchor="middle" letter-spacing="-1.5">for AI Agents</text>

  <!-- Subtitle -->
  <text x="640" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#A1A1AA" text-anchor="middle">UCAN delegation chains  ·  RESTRICT mode  ·  Provably-complete revocation</text>

  <!-- Protocol badge -->
  <rect x="540" y="460" width="200" height="36" rx="8" fill="none" stroke="#27272A" stroke-width="1"/>
  <text x="640" y="484" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#6BCB8B" text-anchor="middle" letter-spacing="2">ADTP v0.1.0-alpha</text>

  <!-- Bottom tags -->
  <text x="640" y="570" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#71717A" text-anchor="middle" letter-spacing="1">Go  ·  Ed25519  ·  Apache 2.0</text>
</svg>
