version: 2

builds:
  - id: adtpd
    main: ./cmd/adtpd
    binary: adtpd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "adtpd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CAPABILITIES.md
      - LICENSE
      - config.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

release:
  prerelease: auto
